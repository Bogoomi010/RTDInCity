<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜덤 조합 디펜스 in City</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0f14;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #wrap {
        position: absolute;
        top: 0;
        left: 0;
        width: 1280px;
        height: 720px;
        transform-origin: top left;
      }
      #app canvas {
        display: block;
      }
      #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        color: #e8eaed;
      }
      #topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 28px;
        padding: 0 24px;
        background: rgba(13, 15, 20, 0.78);
        font-size: 15px;
        box-sizing: border-box;
      }
      #topbar .stat b {
        color: #ffd166;
        font-variant-numeric: tabular-nums;
      }
      #panel {
        position: absolute;
        right: 14px;
        top: 66px;
        width: 306px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: auto;
      }
      button.big {
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        background: #2f6fed;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      button.big:hover {
        background: #4681f4;
      }
      button.big:disabled {
        background: #3a4152;
        cursor: default;
      }
      button.big.alt {
        background: #3a4152;
      }
      button.big.alt:hover {
        background: #4a5468;
      }
      button.big.glow {
        animation: bookglow 1.3s ease-in-out infinite;
      }
      @keyframes bookglow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255, 209, 102, 0); }
        50% { box-shadow: 0 0 14px 2px rgba(255, 209, 102, 0.65); }
      }
      #unitInfo .hint {
        margin-top: 8px;
        color: #6b7382;
        font-size: 12px;
        line-height: 1.6;
      }
      #unitInfo .crowtitle {
        margin-top: 8px;
        font-weight: 700;
        color: #ffd166;
        font-size: 12px;
      }
      #unitInfo .crows {
        max-height: 190px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 4px;
      }
      #unitInfo .crow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        background: #141926;
        border: 1px solid #3a4152;
        border-radius: 7px;
        color: #8f96a3;
        cursor: default;
        text-align: left;
        font-size: 11.5px;
      }
      #unitInfo .crow.ok {
        color: #e8eaed;
        border-color: #ffd166;
        cursor: pointer;
        animation: bookglow 1.3s ease-in-out infinite;
      }
      #unitInfo .crow.ok:hover {
        background: #23282f;
      }
      #unitInfo {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.55;
        min-height: 92px;
      }
      #unitInfo .grade {
        font-weight: 700;
      }
      #story {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #story .rtitle {
        font-weight: 700;
        font-size: 13px;
        color: #d9a05a;
      }
      #story .stbar {
        height: 8px;
        background: #141926;
        border-radius: 4px;
        overflow: hidden;
      }
      #story #st-fill {
        height: 100%;
        width: 100%;
        background: #d9534f;
        transition: width 0.2s linear;
      }
      #story .rbtn {
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        background: #6b4e2e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        align-self: flex-start;
      }
      #story .rbtn:hover {
        background: #8a6a42;
      }
      #recipes,
      #combos,
      #tickets {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #recipes .rtitle,
      #combos .rtitle {
        font-weight: 700;
        font-size: 13px;
        color: #26c6da;
      }
      #combos .rtitle {
        color: #ffd166;
      }
      #tickets .rtitle {
        color: #ffd166;
      }
      #tickets .rbtn {
        background: #23282f;
        border: 1px solid #3a4152;
      }
      #picker {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 45;
        color: #e8eaed;
      }
      #picker .dpanel {
        width: 480px;
        max-height: 80%;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 22px 26px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #picker h2 {
        margin: 0;
        font-size: 20px;
      }
      #picklist {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #picker .rbtn {
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        background: #2f3a4d;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }
      #picker .rbtn:hover {
        background: #3d4b63;
      }
      #book,
      #stocks-panel {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 42;
        color: #e8eaed;
      }
      #stocks-panel .dpanel {
        width: 560px;
        max-height: 84%;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 22px 26px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #stocks-panel h2 {
        margin: 0;
        font-size: 20px;
      }
      #stock-rows {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 13px;
      }
      .srow {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: #141926;
        border: 1px solid #3a4152;
        border-radius: 8px;
      }
      .srow .sname { width: 118px; font-weight: 700; }
      .srow .schart { font-family: monospace; color: #6fcf97; letter-spacing: 1px; }
      .srow .sbtn {
        padding: 5px 9px;
        border: none;
        border-radius: 6px;
        background: #2b3450;
        color: #fff;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
      }
      .srow .sbtn:disabled { opacity: 0.4; cursor: default; }
      #book .dpanel {
        width: 620px;
        max-height: 84%;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 22px 26px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #book h2 {
        margin: 0;
        font-size: 20px;
      }
      #book .btabs {
        display: flex;
        gap: 6px;
      }
      #book .btab {
        padding: 7px 14px;
        border: none;
        border-radius: 8px;
        background: #141926;
        color: #8f96a3;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      #book .btab.on {
        background: #2b3450;
        color: #fff;
      }
      #blist {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
      }
      #book .brow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 9px 14px;
        background: #141926;
        border: 1px solid #3a4152;
        border-radius: 8px;
        color: #b8bcc4;
        cursor: pointer;
        text-align: left;
        font-size: 13px;
      }
      #book .brow:hover:not(:disabled) {
        border-color: #ffd166;
        color: #fff;
      }
      #book .brow:disabled {
        opacity: 0.45;
        cursor: default;
      }
      #recipes .rrow,
      #combos .rrow {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #recipes .rbtn,
      #combos .rbtn {
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        background: #00838f;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }
      #combos .rbtn {
        background: #8d6e00;
      }
      #recipes .rbtn:hover:not(:disabled) {
        background: #00acc1;
      }
      #combos .rbtn:hover:not(:disabled) {
        background: #b28d00;
      }
      #recipes .rbtn:disabled,
      #combos .rbtn:disabled {
        background: #2a303c;
        color: #7c828c;
        cursor: default;
      }
      #recipes .have,
      #combos .have,
      #dex .have {
        color: #8bd48b;
      }
      #recipes .lack,
      #combos .lack,
      #dex .lack {
        color: #6b7078;
      }
      #dex {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 40;
      }
      #dex .dpanel {
        width: 560px;
        max-height: 82%;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 22px 26px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #dex h2 {
        margin: 0;
        font-size: 20px;
      }
      #dexlist {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
      }
      #dex .drow {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #dex .drow span {
        color: #8f96a3;
        text-align: right;
      }
      #deck {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 35;
        color: #e8eaed;
      }
      #deck .dkpanel {
        position: relative;
        width: 720px;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #deck .dkclose {
        position: absolute;
        top: 10px;
        right: 12px;
        background: none;
        border: none;
        color: #8f96a3;
        font-size: 22px;
        cursor: pointer;
        padding: 4px 8px;
      }
      #deck .dkclose:hover {
        color: #ffd166;
      }
      #deck h2 {
        margin: 0;
        font-size: 22px;
      }
      #deck .dksub {
        font-size: 13px;
        color: #8f96a3;
        margin-top: -6px;
      }
      #deck .dkstage {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 14px 8px 8px;
        background: linear-gradient(#141926 70%, #1e2534 70%);
        border: 2px solid #3a4152;
        border-radius: 12px;
      }
      #deck .dkchar {
        background: none;
        border: 2px solid transparent;
        border-radius: 10px;
        padding: 6px 4px 8px;
        cursor: pointer;
        color: #e8eaed;
        text-align: center;
      }
      #deck .dkchar:hover {
        border-color: #5a6478;
      }
      #deck .dkchar .dkshape {
        display: flex;
        justify-content: center;
        transition: transform 0.12s;
      }
      #deck .dkchar:hover .dkshape {
        transform: translateY(-4px);
      }
      #deck .dkchar.on {
        border-color: #ffd166;
        background: rgba(255, 209, 102, 0.08);
      }
      #deck .dkchar.on .dkshape {
        animation: dkbounce 0.7s ease-in-out infinite;
      }
      @keyframes dkbounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      #deck .dkname {
        font-weight: 800;
        font-size: 13px;
        margin-top: 4px;
      }
      #deck .dkbottom {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      #deck .dkparty {
        display: flex;
        gap: 8px;
      }
      #deck .dkslot {
        width: 52px;
        height: 52px;
        border: 2px dashed #3a4152;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4a5261;
        font-size: 20px;
        font-weight: 800;
        background: #141926;
        position: relative;
      }
      #deck .dkslot.filled {
        border-style: solid;
        border-color: #ffd166;
      }
      #deck .dkslot.hiddenslot {
        border-style: solid;
        border-color: #26c6da;
        opacity: 0.9;
      }
      #deck .dkslot.hiddenslot span {
        position: absolute;
        top: -8px;
        right: -6px;
        font-size: 12px;
      }
      #deck .dkinfo {
        flex: 1;
        font-size: 13px;
        line-height: 1.6;
        color: #b8bcc4;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px 14px;
        /* 3줄(이름+능력치+설명)까지 수용 — 호버로 내용이 바뀌어도 패널 높이 고정 */
        min-height: 68px;
      }
      #deck .dkinfo b {
        color: #ffd166;
        font-size: 15px;
      }
      #deck .dkdiff {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #deck .dkdbtn {
        padding: 7px 16px;
        border: 2px solid #3a4152;
        border-radius: 8px;
        background: #141926;
        color: #8f96a3;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      #deck .dkdbtn.on {
        border-color: #ffd166;
        color: #ffd166;
      }
      #deck .dkddesc {
        font-size: 12px;
        color: #8f96a3;
      }
      #deck .dkdesc {
        color: #8f96a3;
      }
      #msg {
        position: absolute;
        left: 0;
        right: 330px;
        top: 116px;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        text-shadow: 0 2px 10px #000;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #pause {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        pointer-events: auto;
        z-index: 30;
      }
      #pause .playbtn {
        background: none;
        border: none;
        color: #e8eaed;
        font-size: 84px;
        line-height: 1;
        cursor: pointer;
      }
      #pause .playbtn:hover {
        color: #ffd166;
      }
      #pause .ptext {
        font-size: 18px;
        font-weight: 700;
        color: #b8bcc4;
      }
      #cards {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        gap: 22px;
        pointer-events: auto;
      }
      #cards .ctitle {
        position: absolute;
        top: 20%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        text-shadow: 0 2px 10px #000;
      }
      #cards .card {
        width: 210px;
        padding: 24px 18px;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        cursor: pointer;
        text-align: center;
        transition: transform 0.12s, border-color 0.12s;
      }
      #cards .card:hover {
        transform: translateY(-6px);
        border-color: #ffd166;
      }
      #cards .cicon {
        font-size: 36px;
      }
      #cards .cname {
        font-size: 18px;
        font-weight: 800;
        margin: 10px 0 6px;
      }
      #cards .cdesc {
        font-size: 13px;
        color: #b8bcc4;
        line-height: 1.5;
      }
      #settings {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 40;
        color: #e8eaed;
      }
      #settings .spanel {
        width: 340px;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #settings h2 {
        margin: 0 0 6px;
        font-size: 22px;
      }
      #settings .srow {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 15px;
      }
      #settings input[type="range"] {
        flex: 1;
      }
      .gearbtn {
        pointer-events: auto;
        background: none;
        border: none;
        color: #e8eaed;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
      }
      .gearbtn:hover {
        color: #ffd166;
      }
      #result {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.78);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        pointer-events: auto;
      }
      #result h1 {
        font-size: 44px;
        margin: 0;
      }
      #result p {
        margin: 0;
        color: #b8bcc4;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="app"></div>
      <div id="ui"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
