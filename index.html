<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜덤 조합 디펜스 in City</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0f14;
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #wrap {
        position: absolute;
        top: 0;
        left: 0;
        width: 1280px;
        height: 720px;
        transform-origin: top left;
      }
      #app canvas {
        display: block;
      }
      #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        color: #e8eaed;
      }
      #topbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 28px;
        padding: 0 24px;
        background: rgba(13, 15, 20, 0.78);
        font-size: 15px;
        box-sizing: border-box;
      }
      #topbar .stat b {
        color: #ffd166;
        font-variant-numeric: tabular-nums;
      }
      #panel {
        position: absolute;
        right: 14px;
        top: 66px;
        width: 306px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: auto;
      }
      button.big {
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        background: #2f6fed;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      button.big:hover {
        background: #4681f4;
      }
      button.big:disabled {
        background: #3a4152;
        cursor: default;
      }
      #unitInfo {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.55;
        min-height: 92px;
      }
      #unitInfo .grade {
        font-weight: 700;
      }
      #recipes {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #recipes .rtitle {
        font-weight: 700;
        font-size: 13px;
        color: #26c6da;
      }
      #recipes .rrow {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #recipes .rbtn {
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        background: #00838f;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }
      #recipes .rbtn:hover:not(:disabled) {
        background: #00acc1;
      }
      #recipes .rbtn:disabled {
        background: #2a303c;
        color: #7c828c;
        cursor: default;
      }
      #recipes .have {
        color: #8bd48b;
      }
      #recipes .lack {
        color: #6b7078;
      }
      #msg {
        position: absolute;
        left: 0;
        right: 330px;
        top: 116px;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        text-shadow: 0 2px 10px #000;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #cards {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        gap: 22px;
        pointer-events: auto;
      }
      #cards .ctitle {
        position: absolute;
        top: 20%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        text-shadow: 0 2px 10px #000;
      }
      #cards .card {
        width: 210px;
        padding: 24px 18px;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        cursor: pointer;
        text-align: center;
        transition: transform 0.12s, border-color 0.12s;
      }
      #cards .card:hover {
        transform: translateY(-6px);
        border-color: #ffd166;
      }
      #cards .cicon {
        font-size: 36px;
      }
      #cards .cname {
        font-size: 18px;
        font-weight: 800;
        margin: 10px 0 6px;
      }
      #cards .cdesc {
        font-size: 13px;
        color: #b8bcc4;
        line-height: 1.5;
      }
      #settings {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        z-index: 40;
        color: #e8eaed;
      }
      #settings .spanel {
        width: 340px;
        background: #1b2130;
        border: 2px solid #3a4152;
        border-radius: 14px;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #settings h2 {
        margin: 0 0 6px;
        font-size: 22px;
      }
      #settings .srow {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 15px;
      }
      #settings input[type="range"] {
        flex: 1;
      }
      .gearbtn {
        pointer-events: auto;
        background: none;
        border: none;
        color: #e8eaed;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
      }
      .gearbtn:hover {
        color: #ffd166;
      }
      #result {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.78);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        pointer-events: auto;
      }
      #result h1 {
        font-size: 44px;
        margin: 0;
      }
      #result p {
        margin: 0;
        color: #b8bcc4;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="app"></div>
      <div id="ui"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
